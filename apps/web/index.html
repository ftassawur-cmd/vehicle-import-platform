    <script>try{var t=localStorage.getItem("jsl-theme");if(t==="light"||(t!=="dark"&&matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.dataset.theme="light"}catch(e){}</script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "JSL Imports",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Web",
          "description": "Landed-cost calculator for importing vehicles from Japan to Sri Lanka. Itemises CIF, customs duty, surcharges, excise, luxury tax, SSCL and VAT with dated rule-set provenance.",
          "url": "https://jslimports.lk/",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "LKR" }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Are these figures official?",
              "acceptedAnswer": { "@type": "Answer", "text": "No. Results are estimates built from gazettes, the Customs tariff guide and reported schedules. Every line carries a confidence badge and a source reference, and anything unverified is flagged amber. Confirm with a licensed Customs House Agent before committing funds." }
            },
            {
              "@type": "Question",
              "name": "Why does the LC opening date change the total?",
              "acceptedAnswer": { "@type": "Answer", "text": "The temporary 50% surcharge (Gazette 2488/56, in force 16 May – 15 Aug 2026) exempts vehicles whose letter of credit was opened on or before 15 May 2026. The calculator applies or removes it from your LC date and shows the difference." }
            },
            {
              "@type": "Question",
              "name": "How old a vehicle can I import?",
              "acceptedAnswer": { "@type": "Answer", "text": "Age limits are set per vehicle class by the Imports & Exports (Control) Regulations No. 01 of 2025 — for example 3 years for cars and SUVs, 5 for vans, measured from first registration to the bill-of-lading date. The calculator blocks ineligible builds and tells you why." }
            }
          ]
        }
      ]
    }
    </script>
